id: wahlaufruf-postkarte-a6-quer
version: 0.1.0
title: Wahlaufruf-Postkarte A6 quer
format: A6
orientation: landscape
pages: 2
preview_dpi: 100
audience: [bezirksgruppe, ortsgruppe, kandidat]
description: >
  Zweiseitige Wahlaufruf-Postkarte A6 quer (148×105 mm). Vorderseite trägt
  den Wahlkreuz auf Dunkelgrün-Vollbild + Headline „Wähle Grün am [Datum]".
  Rückseite trägt 2×2 Info-Grid mit Antworten auf typische Fragen + Impressum.

build:
  script: build.py
  output: template.sla

# DSL-original — no round-trip diff. SHA pin for stale-check.
previews_for_sla: 43a7b8eca95d97294dca658edcc1e735d42a09d03695a8cf53c843ef5a7a1e61
ci_overrides:
  non_ci_styles:
    - "wahlaufruf/headline"
    - "wahlaufruf/cell-headline"
    - "wahlaufruf/cell-body"
    - "wahlaufruf/impressum"
  non_ci_colors: []

slots:
  seitenhintergrund_front:
    type: shape
    description: Vollbild Dunkelgrün-Hintergrund (D12 — Wahlkreuz auf farbigem Brand-Hintergrund)
    anname: "Seitenhintergrund (front)"
  wahlkreuz:
    type: image
    description: Wahlkreuz-Hero (gelbes Kreuz im weißen Kreis), 55×55 mm zentriert auf Dunkelgrün
    source: shared/assets/wahlkreuz.png
    anname: "Wahlkreuz"
  headline_wahlaufruf:
    type: text
    description: Headline unter Wahlkreuz, 24pt Gotham Narrow Bold, weiß
    anname: "Headline-Wahlaufruf"
  cell_1_headline:
    type: text
    description: 2×2-Grid Cell 1 — Was wir tun (14pt Dunkelgrün)
    anname: "Cell 1 — Headline"
  cell_1_body:
    type: text
    anname: "Cell 1 — Body"
  cell_2_headline:
    type: text
    description: 2×2-Grid Cell 2 — Warum Grün
    anname: "Cell 2 — Headline"
  cell_2_body:
    type: text
    anname: "Cell 2 — Body"
  cell_3_headline:
    type: text
    description: 2×2-Grid Cell 3 — Wann gewählt wird
    anname: "Cell 3 — Headline"
  cell_3_body:
    type: text
    anname: "Cell 3 — Body"
  cell_4_headline:
    type: text
    description: 2×2-Grid Cell 4 — Wo informieren
    anname: "Cell 4 — Headline"
  cell_4_body:
    type: text
    anname: "Cell 4 — Body"
  impressum:
    type: text
    description: Mediengesetz §24 Impressum-Strip (Rückseite)
    anname: "Impressum"

example_pages:
  - { num: 1, label: "Vorderseite — Wahlkreuz hero" }
  - { num: 2, label: "Rückseite — 2×2 Info-Grid + Impressum" }

preflight:
  bleed_mm: 3
  cmyk_only: true
  min_image_dpi: 300
