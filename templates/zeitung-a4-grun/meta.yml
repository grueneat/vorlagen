id: zeitung-a4-grun
version: 0.1.0
title: Grüne Zeitung A4
format: A4
orientation: portrait
pages: 9
audience: [bezirksgruppe, landesgruppe]
description: >
  Mehrseitige A4-Zeitungsvorlage mit Master-Pages und Beispielseiten.
  Eine Datei mit allen typischen Layout-Optionen — Bezirks- und
  Landesgruppen duplizieren die gewünschten Beispielseiten, passen
  Inhalte an und löschen ungenutzte Beispiele.
build:
  script: build.py
  output: template.sla

# Round-trip validation (issue #2)
original_sla: ../../gruene-zeitung-vorlage-original.sla
previews_for_sla: 9e914ec9e9473d3ea68d6a57d70bd2d2a4b23dec5eb25f39e203cbba8755437e

# Issue #16 — this template intentionally diverges from gruene-zeitung-
# vorlage-original.sla at two frames (build.py:1802 P9 Spread, build.py:2061
# unnamed page-12 polygon — both authoring drift in the upstream Scribus
# original). Strict round-trip diff is opted out here; the divergence is
# documented in this template's README.md and gated by render_pipeline.py
# honouring this flag.
sla_diff_strict: false

# Issue #12 — brand_overrides (see shared/brand/SPEC-WRITING-GUIDE.md).
brand_overrides:
  - id: brand:line_spacing_0.9
    reason: >-
      Production template auto-generated from gruene-zeitung-vorlage-original
      .sla; multiple per-template para-styles drift from Quickguide 0.9 factor
      (e.g. Titelseite Header 46/55=0.84, Bildunterschrift weiß 12/10=1.2x).
      The Zeitung uses journalism conventions (tighter headline leading, looser
      caption leading) that differ from the unified-Quickguide rule. Round-
      trip diff is the byte-stable contract.
  - id: brand:inside_page
    reason: >-
      Residual after issue #16: the rotated cover-page polygon `u2950`
      (build.py:246-256, 148.6×220.5 mm at (216.41, 155.57), rotation 90°,
      fill Dunkelgrün) overflows the page bottom by ~4.17 mm — its
      rotation-aware bbox extends below y=300. Tracked separately in
      GH #39. Removing this override requires resolving #39 first
      (do not delete pre-emptively — `structural_check --all` will go
      red).
ci_overrides:
  non_ci_styles:
    - "Default Paragraph Style"
    - "[No paragraph style]"
    - "Titelseite Header"
    - "Monat/Ausgabe"
    - "Zustellerhinweis (Post)"
    - "Impressum"
    - "Copyright"
    - "Seitenzahl"
    - "Fließtext"
    - "Schrift Störer"
    - "Inhaltsheadline Titelseite"
    - "Überschrift weiß"
    - "Überschrift Dunkelgrün"
    - "Bildunterschrift weiß"
    - "Fließtext weiß"
    - "Fließtext in grünem Kasten"
    - "Headline in grünem Kasten"
    - "Zwischenüberschrift"
    - "Einleitungstext"
    - "Zwischenüberschrift weiß"
    - "Zitat weißer Text"
    - "Zitat grüner Text"
    - "NormalParagraphStyle"
  non_ci_colors:
    - "Green"
masters:
  - { name: Normal,            description: implicit baseline }
  - { name: rechts-3col,       description: rechte Innenseite mit 3-Spalten-Raster und Footer-Akzent }
  - { name: links-3col,        description: linke Innenseite mit 3-Spalten-Raster und Footer-Akzent }
  - { name: titelseite,        description: Cover-Layout mit Hero-Bereich }
  - { name: foto-spread,       description: Vollbild-Fotoseite }
  - { name: impressum-master,  description: Rückseite mit Impressum-Block }
example_pages:
  - { num: 1, label: Titelseite (Cover) }
  - { num: 2, label: "Beispiel: Hauptartikel 3-spaltig" }
  - { num: 3, label: "Beispiel: Drei Artikel nebeneinander" }
  - { num: 4, label: "Beispiel: Foto-Doppelseite (links)" }
  - { num: 5, label: "Beispiel: Foto-Doppelseite (rechts)" }
  - { num: 6, label: "Beispiel: Veranstaltungskalender" }
  - { num: 7, label: "Beispiel: Interview-Layout" }
  - { num: 8, label: "Beispiel: Kommentar mit Pull-Quote" }
  - { num: 9, label: Impressum + Postvermerk }
preflight:
  bleed_mm: 3
  cmyk_only: true
  min_image_dpi: 300
