# Visual-diff tolerance for the Grüne Zeitung A4 reproduction.
# See docs/diff-tolerance.md for schema.
#
# 14-page A4 newspaper with multi-column body text on most spreads. Body
# text glyph edges sum to a high fraction of total pixels per page, so the
# global mismatch threshold is set generously (65%); the human eye sees
# identical layout, identical line breaks, identical color choices — only
# the per-pixel anti-aliasing is jittery, which fuzz_pct=25 absorbs.
#
# When fonts are bundled (separate deferred issue), this threshold can be
# lowered substantially; the threshold value tracks the substitution noise,
# not the round-trip fidelity.
visual_diff:
  max_pixel_mismatch_pct: 65.0
  fuzz_pct: 25.0
