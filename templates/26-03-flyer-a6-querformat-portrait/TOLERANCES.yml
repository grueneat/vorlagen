tolerances:
- id: tol:inventory-offpage-registration-marks
  audit: inventory
  classification: human-review
  severity: cosmetic
  max_issues: 6
  reason: '6 dropped elements. The converter deliberately skips six 17.9x17.9pt
    Rectangle elements (u5b1, u6f0, u6f2, u77f, u901, u902) that the IDML places
    far outside the page (x=476..794pt or x=-504pt — well beyond the 419pt page
    width). They are inline vector paths with no <Image>/<PDF> child
    (registration / colour-control furniture on the pasteboard). The converter
    logs each as "[skip] Rectangle ... entirely outside page bounds ... InDesign
    design artifact, not emitted"; InDesign also omits them from the trimmed PDF
    export. A deliberate, documented non-emit — not a silent drop (the scaffold
    completeness assertion passes: every element is either emitted or explicitly
    recorded as skipped).'
  follow_up_issue: none; correct converter behaviour, audit is conservative
- id: tol:image-audit-vector-path-delta
  audit: image_audit
  classification: scribus-engine-bug
  severity: cosmetic
  max_issues: 28
  reason: '24 vector-path / image deltas, derivative of the Scribus raster/ICC
    rendering differences on full-bleed Dunkelgruen page backgrounds and photo
    content, plus the IDML inline decorative vector paths (curly quotes,
    Wahlkreis ellipse / underline ornaments) the converter extracts as inline
    images rather than re-emitting as Scribus Polygon items. Same gap class as
    the sibling flyer templates (26-03-flyer-a6-hochformat-*).'
  follow_up_issue: engine-bug; intrinsic raster + ICC differences
# NOTE (2026-05-18 re-import): the former tol:image-content-cmyk-render and
# tol:image-frame-visibility-cmyk-and-faint-icon entries were REMOVED. The
# converter/audit-chain CMYK->sRGB + aspect-fill fix set resolved both audits:
# image_content_audit now reports 0 broken (was 2: u9cc, u906) and
# image_frame_visibility_audit reports 0 invisible/faint (was 1+1). All four
# image frames render with asset_render_ratio 0.94-1.00 (DIE GRÜNEN logo u46c
# 0.94, well above the 0.35 floor). No tolerance needed.
- id: tol:systematic-text-line-wrap-no-sim-rows
  audit: systematic_text_audit
  classification: scribus-engine-bug
  severity: structural
  max_issues: 12
  reason: '6 frames flagged sim-actionable (down from 12 after the 2026-05-18
    re-import: the body ParaStyle leading was corrected 16.0->15.0pt to match the
    baseline-grid-aligned InDesign render, which closed half the frames). The
    line_spacing playbook simulator (tools/line_spacing_sim.py) returned NO ROWS
    for every remaining frame — the residual drift is line-WRAP-count divergence,
    not a leading value. The systematic audit reason for each is verbatim
    "line count differs ... text wrapped differently": u6d8 10->12, u92e 10->12,
    u94a 8->11, u6aa/u6aa_l2/u6c1 single-line headline-split count quirks. No
    single (LINESPMode, LINESP) reconciles a wrap-count difference. Cap kept at
    12 (head-room over the 6 measured).'
  follow_up_issue: engine-bug; cross-renderer line-wrap (same root cause as text_position_audit)
- id: tol:text-position-jitter-freetype-kerning
  audit: text_position_audit_jitter
  classification: scribus-engine-bug
  severity: cosmetic
  max_issues: 38
  reason: '37 sub-perceptible (<=5pt) per-word position drifts — FreeType-vs-
    InDesign per-character kerning jitter intrinsic to the two rasterisers. The
    2026-05-18 re-import corrected the body leading 16.0->15.0pt, which shifted
    word baselines and moved a few words across the 5pt jitter/structural
    boundary (32 -> 37 sub-perceptible). Cap raised 36 -> 38 to track the fresh-
    render count (TOLERANCE_LOG row 6). The line_spacing sim returned no rows for
    any frame; the y_mm_shift playbook applied what uniform shifts it could
    derive. Sub-perceptible jitter, below the visible threshold. The structural
    bucket (text_position_audit_structural) catches the larger >5pt shifts.'
  follow_up_issue: engine-bug; intrinsic to FreeType rasterisation
- id: tol:text-position-structural-cross-renderer-wrap
  audit: text_position_audit_structural
  classification: scribus-engine-bug
  severity: structural
  max_issues: 290
  reason: '206 large (>5pt) word-position drifts (down from 279 after the
    2026-05-18 re-import body-leading correction). The drift is dominated by
    cross-renderer line-wrap differences — Scribus and InDesign break the
    justified body / bullet-list paragraphs at slightly different words because
    their font-metric and hyphenation models differ. On the merged facing
    spreads (839pt-wide pages) the same lorem-ipsum word appears on both the
    left and right page, so word-matching also pairs a left-page word with its
    right-page twin, producing dx of several hundred pt. Not a converter bug and
    not a routing bug. NOT FIXED, NOT TOLERATED-AS-PASSING — preflight stays red
    until a Scribus justification/hyphenation alignment lands or the baseline is
    re-flowed.'
  follow_up_issue: engine-bug; cross-renderer paragraph line-wrap divergence
- id: tol:text-render-cross-renderer-wrap-overflow
  audit: text_render_audit
  classification: scribus-engine-bug
  severity: structural
  max_issues: 12
  reason: '5 unique words missing from the render (down from 10 after the
    2026-05-18 re-import). The missing words (dis, quab, quam, quis,
    voloriaspita) are tail/boundary words of the justified body-text paragraphs.
    Verified NOT clipped: pdfplumber line-top scans of u6d8 (last line 97.3mm <
    frame bottom 103.1mm) and u94a (last line 103.8mm < bottom 109.1mm) show all
    text fits inside the frame. The mismatch is a cross-renderer text-extraction
    artifact: build.py joins wrapped fragments with U+2028 line separators
    (e.g. "volorias pita") which InDesign extracts as one token but Scribus
    breaks into two, and the differing justified wrap re-tokenises boundary
    words. Same root cause as text_position_audit_structural; consistent with
    the preflight "text extraction engines disagree" note. Cap kept at 12.'
  follow_up_issue: engine-bug; cross-renderer line-wrap overflow
- id: tol:visual-diff-regions-cross-renderer
  audit: visual_diff_regions
  classification: scribus-engine-bug
  severity: structural
  max_issues: 44
  reason: '38 hot grid regions. Derivative of the same cross-renderer text wrap
    differences catalogued above — a hot region fires wherever wrapped text
    shifts. The CMYK images that previously contributed (u9cc, u906) now render
    correctly after the 2026-05-18 CMYK->sRGB fix set, so the residual is purely
    the page-grid view of the text-wrap drift. Not an independent defect.'
  follow_up_issue: engine-bug; aggregate view of text-wrap residuals
- id: tol:line-match-cross-renderer-wrap
  audit: line_match_audit
  classification: scribus-engine-bug
  severity: structural
  max_issues: 27
  reason: '27 mismatched lines (40/67 matched). Documentation-only (severity
    structural — preflight stays red, not fudged green). Breakdown of the 27:
    (a) 22 wrap/unmatched findings in the justified 2-column body frames u6d8
    (8), u92e (8), u94a (5), u67c (1) — cross-renderer line-wrap divergence,
    the same root cause as text_position_audit_structural. Gotham Narrow Book
    renders ~0.75% wider in Scribus than InDesign so each justified line holds
    one word fewer (measured: baseline col-1 line-1 "Usapiene mporia quisin
    consequid" = 4 words across 56mm, preview "Usapiene mporia quisin" = 3 words
    across the same 56mm). Fitting the lost word would need ~16% horizontal
    compression — far beyond a non-distorting glyph shrink (min_glyph_shrink is
    already 0.98). Unclosable without a Scribus justification/hyphenation
    alignment. (b) 2 first_word_x findings of +-28pt on the rotated -90deg
    Impressum frames u693/u85a — rotated-frame vertical-centring (Scribus engine
    limit; vertical_text_align on a rotated frame does not match InDesign). (c)
    3 first_word_x findings of 1.7-2.4pt on u60a (subheadline) and u980 (Vollkorn
    citation) — minor x-drift from the ~0.75% Vollkorn/Gotham glyph-width
    difference. The frame_vertical_position / baseline_y findings that appeared
    pre-tune on u94a were CLOSED by the body-leading correction.'
  follow_up_issue: engine-bug; cross-renderer line-wrap + rotated-frame centring
