id: themen-plakat-a3-quer
version: 0.1.0
title: Themen-Plakat A3 quer
format: A3
orientation: landscape
pages: 1
preview_dpi: 100
audience: [bezirksgruppe, landesgruppe, ortsgruppe]
description: >
  Argumentations-Plakat A3 quer (420×297 mm) für sachthemen-orientierte Aufhänge in
  Gemeindeämtern, Lokalen und auf Infotafeln. Layout: Hauptthese span volle Breite,
  3-Spalten-Belege darunter, Quelle + Impressum unten.
build:
  script: build.py
  output: template.sla

# No round-trip diff — this is a DSL-original template (no original_sla key).
previews_for_sla: b89e207447b5d61bfe8295a2bd0c36a05af70245071f690bb9efebb789c5f9c7

# Issue #12 — brand_overrides: rules whose violation is INTENTIONAL design.
# Each entry must have a `reason` explaining why the deviation is acceptable.
# See shared/brand/SPEC-WRITING-GUIDE.md "Brand-Override-Konvention".
brand_overrides:
  - id: brand:line_spacing_0.9
    reason: >-
      The CI palette in shared/ci.yml carries linesp/fontsize ratios that drift
      from the Quickguide 0.9 factor (e.g. ci/body-12 has 13/12 = 1.083). This
      is real palette-versus-rule drift across all templates and warrants a
      separate brand-team review (out of scope for #12). Per-template overrides
      apply uniformly.
  - id: brand:hl_sl_distance_x2
    reason: >-
      Sub-Headline at y=92 sits ~2mm below the 50mm-tall headline frame; the
      Quickguide 2*baseline (10.8mm) target assumes a body-12 baseline,
      whereas this Plakat uses a 60pt headline -> 18pt sub pair where the
      visual rhythm is set by the larger fontsize. Tight HL/SL gap is the
      Plakat's intentional poster-style hierarchy.
  - id: brand:logo_size_3M
    reason: >-
      Logo at 32mm sits at ~60% of the Quickguide 3*M = 53.46mm target on A3
      quer (kurze_kante=297mm). The corner-anchored placement intentionally
      avoids competing with the wide thesis headline; doubling the logo width
      would push it into the headline's typographic field.
  - id: brand:visual_adjacency_drift
    reason: >-
      V1 layout work in #19 owns alignment encoding for this template.
      Re-enable once V1 lands and a CONSTRAINTS list captures the
      declared adjacencies (Issue #22 locked decision #9). Issue #23
      renamed brand:undeclared_alignment_drift -> brand:visual_adjacency_drift.
  - id: brand:image_text_overlap
    reason: >-
      Scheduled for follow-up audit per #23 — caption-on-photo / decorative
      overlaps audited at time of #23, not yet reviewed for fix-vs-override
      classification.
  - id: brand:image_fills_frame
    reason: >-
      Scheduled for follow-up audit per #24 — image-fills-frame check
      added in #24 surfaces letterbox/INJECT_MAP-drift class globally;
      per-template review for fix-vs-override classification deferred
      to follow-up issue (#25). Zeitung is the only template with
      verified clean image-content extents post-#24.
ci_overrides:
  non_ci_styles:
    - "themen-plakat/headline"
    - "themen-plakat/sub"
    - "themen-plakat/beleg-headline"
    - "themen-plakat/beleg-body"
    - "themen-plakat/source"
    - "themen-plakat/impressum"
    - "themen-plakat/stat-hero"
    - "themen-plakat/beleg-body-on-green"
    - "themen-plakat/beleg-headline-yellow"
  non_ci_colors: []

slots:
  headline_thesis:
    type: text
    description: 1-zeilige Hauptthese (Argumentations-Anker)
    anname: "Headline These"
  subheadline:
    type: text
    description: Sub-Headline mit Kontext (Region, Datum)
    anname: "Sub-Headline"
  evidence_1_headline:
    type: text
    description: Beleg 1 — kurzer Kennzahl-Anker
    anname: "Beleg 1 — Headline"
  evidence_1_body:
    type: text
    description: Beleg 1 — 3-5 Sätze Kontext
    anname: "Beleg 1 — Body"
  evidence_2_headline:
    type: text
    anname: "Beleg 2 — Headline"
  evidence_2_body:
    type: text
    anname: "Beleg 2 — Body"
  evidence_3_headline:
    type: text
    anname: "Beleg 3 — Headline"
  evidence_3_body:
    type: text
    anname: "Beleg 3 — Body"
  quelle:
    type: text
    description: Quelle/Source-Citation (klein, unten links)
    anname: "Quelle"
  impressum:
    type: text
    description: Mediengesetz §24 Impressum (unten rechts)
    anname: "Impressum"
  logo_grueneAT:
    type: image
    description: Grünen-Logo (top-left, Brand-Bund)
    source: shared/logos/gruene-logo-bund-dunkel.png
    optional: true
    anname: "Logo Grüne (top-left)"

example_pages:
  - { num: 1, label: "Themen-Plakat A3 quer (Vorderseite)" }

preflight:
  bleed_mm: 3
  cmyk_only: true
  min_image_dpi: 300
