id: infostand-tent-card-a5-quer
version: 0.1.0
title: Infostand-Tent-Card A5 quer
format: A4
orientation: landscape
pages: 1
preview_dpi: 100
audience: [bezirksgruppe, ortsgruppe, infostand-helfer]
description: >
  A4 quer (297×210 mm) gefalzt zu A5-Tent. Steht selbsttragend auf Tisch am
  Infostand, im Pfarrkaffee oder bei Veranstaltungen. Zwei Panele
  (DE oben, EN unten) lesen je nach Tisch-Seite.

build:
  script: build.py
  output: template.sla

previews_for_sla: cb9a98c5bb8e90c749f20c2e2c425a941e27aa3fc68c2bffc5c9a4585074a45a

# Issue #12 — brand_overrides (see shared/brand/SPEC-WRITING-GUIDE.md).
brand_overrides:
  - id: brand:line_spacing_0.9
    reason: >-
      Shared with all templates: CI palette ratios drift from Quickguide
      0.9 factor — addressed at brand-team review level.
  - id: brand:logo_size_3M
    reason: >-
      Both panel logos at 36mm sit 1.8mm under 3*M = 37.80mm — narrow
      tolerance, intentional sizing chosen so the logo doesn't dominate the
      reduced height of each tent-card panel (panel height 105mm). Mirroring
      the same width on both panels is the dominant design constraint.
  - id: brand:visual_adjacency_drift
    reason: >-
      V1 layout work in #20 owns alignment encoding for this template.
      Re-enable once V1 lands and a CONSTRAINTS list captures the
      declared adjacencies (Issue #22 locked decision #9). Issue #23
      renamed brand:undeclared_alignment_drift -> brand:visual_adjacency_drift.
  - id: brand:image_text_overlap
    reason: >-
      Scheduled for follow-up audit per #23 — caption-on-photo / decorative
      overlaps audited at time of #23, not yet reviewed for fix-vs-override
      classification.
  - id: brand:image_fills_frame
    reason: >-
      Scheduled for follow-up audit per #24 — image-fills-frame check
      added in #24 surfaces letterbox/INJECT_MAP-drift class globally;
      per-template review for fix-vs-override classification deferred
      to follow-up issue (#25). Zeitung is the only template with
      verified clean image-content extents post-#24.
ci_overrides:
  non_ci_styles:
    - "tent/headline"
    - "tent/body"
    - "tent/impressum"
  non_ci_colors:
    - "Falz"             # document-local spot color
  non_ci_layers:
    - "Falz"

slots:
  headline_panel_a:
    type: text
    description: Headline Panel A (DE) — 36pt Vollkorn Italic Dunkelgrün
    anname: "Headline Panel A"
  body_panel_a:
    type: text
    description: 3-Bullet Body Panel A — 14pt Gotham Book
    anname: "Body Panel A"
  falzlinie:
    type: shape
    description: Mittelfalz horizontal y=105 (Falz-Layer Spot-Color)
    anname: "Mittelfalz (horizontal)"
  headline_panel_b:
    type: text
    description: Headline Panel B (EN) — 36pt Vollkorn Italic Dunkelgrün, rotated 180°
    anname: "Headline Panel B"
  body_panel_b:
    type: text
    description: 3-Bullet Body Panel B — 14pt, rotated 180°
    anname: "Body Panel B"
  impressum:
    type: text
    description: Mediengesetz §24 Impressum (auf Panel A, knapp über Falz)
    anname: "Impressum (Tent)"

example_pages:
  - { num: 1, label: "Flach (vor dem Falzen) — Panel A oben, Panel B unten 180°" }

preflight:
  bleed_mm: 3
  fold_mm: [105]
  cmyk_only: true
  min_image_dpi: 300
