audience:
- bezirksgruppe
- landesgruppe
description: 'Mehrseitige Zeitung im A4-Format für lokale Berichterstattung und Themenvielfalt.'
build:
  script: build.py
  output: template.sla
original_sla: ../../gruene-zeitung-vorlage-original.sla
previews_for_sla: 8e74e67ada08517b7a4c0710776eef7b8663a255ea6c280f836f0cda14f0ae05
sla_diff_strict: false
# Zeitung is pinned to a faithful reproduction of the original InDesign SLA
# (build.py geometry reset to it — 0 position/size drift). Scribus's
# auto-leading is slightly looser than InDesign's, so ~67 characters (one
# "Zitat, aber anders" headline + one lorem tail line) clip on the
# original frame sizes. Closing that residual would require widening
# frames away from the original geometry — which is explicitly NOT wanted
# here. The text-render audit still runs and reports the residual.
text_render_strict: false
brand_overrides:
- id: brand:line_spacing_0.9
  reason: Production template auto-generated from gruene-zeitung-vorlage-original
    .sla; multiple per-template para-styles drift from Quickguide 0.9 factor (e.g.
    Titelseite Header 46/55=0.84, Bildunterschrift weiß 12/10=1.2x). The Zeitung uses
    journalism conventions (tighter headline leading, looser caption leading) that
    differ from the unified-Quickguide rule. Round- trip diff is the byte-stable contract.
- id: brand:image_text_overlap
  reason: 'Caption-on-photo intentional design pattern: several text frames (page-1
    cover headline u2989 over u2950 band, page-3/page-7 caption text inside u6ad/Kopie-von-u6ad
    polygons, page-14 captions on P13 Hero) extend slightly beyond their containing
    colored polygons. The page-10 Polygon `Kopie von u1529` overlap with text columns
    `Kopie von u2d5c (13)`/`(16)` was the documented bug — FIXED in Issue #23 T07
    by shrinking the columns'' h_mm to end above the green card. Remaining 9 cases
    are caption-on-photo design intent; tightening text frames to match polygon edges
    exactly would change the visual layout. Out of scope for #23; revisit per follow-up
    audit.'
- id: brand:inside_page
  reason: >-
    Zeitung geometry was reset to the original InDesign SLA — the #40/#42/#45/#48/#51
    alignment "fixes" had wrongly pulled full-bleed and cross-page spread images
    page-local. The original layout (confirmed correct) places hero/spread images
    (P9 Spread, P1/P13 Hero, the page-13 full-page tile, the u2950 cover polygon)
    so they extend across the spread and into the adjacent page's bleed. The
    inside_page rule models single-page frames and cannot represent an intentional
    cross-page newspaper spread.
- id: brand:bleed_coverage
  reason: >-
    Same reset as brand:inside_page. The bleed_coverage rule expects each frame's
    outer edge to land on its own page's bleed line; the zeitung cover/hero/spread
    frames span both pages of a spread, so a single frame's outer edge legitimately
    sits at the far page edge rather than at -3mm. The original InDesign SLA layout
    is the convergence target.
- id: brand:band_consistency
  reason: >-
    Same reset as brand:inside_page. The original newspaper layout runs full-bleed
    hero/spread photos (Cover Hero, P1/P13 Hero, P4 Foto-Spread, P9 Spread) that
    cross the header/free/footer band boundaries by design, plus editorial
    photo/caption frames that sit a few mm outside the body-margin spec.
    band_consistency models a single-column body pool and cannot represent a
    14-page newspaper's editorial grid.
body_block_margins:
  bands:
    header:
      y_top_mm: 20.0
      y_bottom_mm: 49.0
    footer:
      y_top_mm: 283.0
      y_bottom_mm: 297.0
  margins:
    left:
      outer_mm: 20.0
      inner_mm: 20.0
    right:
      outer_mm: 20.0
      inner_mm: 20.0
  background_decoration:
    fills:
    - Dunkelgrün
    - Hellgrün
    - Magenta
    - Gelb
    - White
