brand_overrides:
- id: brand:bleed_3mm
  reason: 'IDML-imported leporello template (scaffold). The IDML''s InDesign document was
    authored with bleed=0 and build.py deliberately emits bleed_mm=0 (see the build.py module
    docstring) so the rendered PDF compares directly against the InDesign baseline.pdf, which
    itself exports trim-only. The Quickguide requires a 3mm print bleed; the existing IDML
    asset predates that requirement. Same gap class as the shipped sibling 26-03-leporello-z-falz-99x210-6-seitig-gruenes-cover
    which carries the identical brand_overrides block. Resolution path: extend tools/idml_to_dsl.py
    to inject the brand-required 3mm bleed at scaffold time (deferred).'
- id: brand:image_text_overlap
  reason: 'IDML-imported leporello template (scaffold). The original InDesign layout deliberately
    overlays text on full-bleed photo backdrops and on decorative brand-color shapes (headline/Zitat
    frames over green-pine photo backgrounds and over the magenta Stoerer diamond) — the visual
    result is intentional white-text-on-photo / text-on-color. The brand:image_text_overlap
    rule cannot distinguish intentional design overlay from accidental clipping. Same gap
    class as the shipped sibling 26-03-leporello-z-falz-99x210-6-seitig-gruenes-cover which
    carries the identical brand_overrides block. Resolution path: per-frame intent annotation
    in the rule (deferred to a separate pass).'
- id: brand:inside_page
  reason: 'IDML-imported leporello template (scaffold). The IDML spread coordinate system
    places multi-panel content (6 panels) on a single oversized canvas while the converter
    declares trim-sized pages; frames belonging to later panels register outside their declared
    page''s trim box. tools/idml_to_dsl.py preserves the source geometry verbatim per issue
    #35 P1 (baseline.pdf is the convergence target). Same gap class as the shipped sibling
    26-03-leporello-z-falz-99x210-6-seitig-gruenes-cover which carries the identical brand_overrides
    block. Resolution path: emit a true multi-panel spread layout from the converter so every
    frame registers inside one of the panel pages (deferred).'
- id: brand:line_spacing_0.9
  reason: 'IDML-imported leporello template (scaffold). The original InDesign ParagraphStyles
    (the idml/* family plus the ci/* family) carry leading values that do NOT follow the Quickguide
    0.9-factor convention (14 styles affected, e.g. ci/default linesp=13 fontsize=12 = 1.08x;
    ci/headline-ultra linesp=23 fontsize=27 = 0.85x; idml/no-paragraph-style linesp=17.4 fontsize=12
    = 1.45x). tools/idml_to_dsl.py emits these verbatim from the IDML Resources/Styles.xml;
    changing them would diverge from the InDesign-authored baseline.pdf which is the convergence
    target (issue #35 P1). Same gap class as the shipped sibling 26-03-leporello-z-falz-99x210-6-seitig-gruenes-cover
    which carries the identical brand_overrides block. Resolution path: per-template tune
    pass to reconcile leading against the brand convention (deferred).'
