# Visual-diff tolerance for the Tischschild A5 Querformat (tent card).
# See docs/diff-tolerance.md for schema.
#
# DSL-only template (no original_sla / no template-preview.sla split): the
# baseline.pdf is the template.sla render itself, so visual_diff renders the
# same source it compares against. Scribus rasterises deterministically, so the
# measured drift is 0.0000% on the single page. fuzz_pct matches the project-wide
# DSL default; max_pixel_mismatch_pct stays at the tight 1.0 default.
dpi: 300
fuzz_pct: 25.0
