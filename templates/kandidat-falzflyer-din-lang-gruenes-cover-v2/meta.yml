id: kandidat-falzflyer-din-lang-gruenes-cover-v2
version: 0.1.0
title: Kandidat-Falzflyer DIN-lang (Grünes Cover v2)
format: A4
orientation: landscape
pages: 2
preview_dpi: 100
audience: [kandidat, bezirksgruppe, ortsgruppe]
description: >
  3-fach Zickzackfalz A4-quer-Themenflyer mit grünem Cover. Imported from
  InDesign IDML via tools/idml_to_dsl.py — initial slot schema; refine
  after first gallery render. Annames are IDML Self IDs verbatim
  (u-prefixed); a human will refactor them to semantic slot names
  post-bootstrap.

build:
  script: build.py
  output: template.sla

# Pinned by bin/check-stale-previews; updated by bin/render-gallery on
# each rebuild. Initial value is the SHA of the converter-emitted SLA.
previews_for_sla: c993b8cbe2abd9b69c57bd99bc6733381f7f09492d8f8eca11bbf38cb0b9de71
brand_overrides: []

ci_overrides:
  non_ci_styles:
    - "idml/absatzformat-1"
    - "idml/aufzaehlungen-auf-gruenem-hintergrund"
    - "idml/fliesstext-auf-gruenem-hintergrund"
    - "idml/headline-in-gruenem-kasten"
    - "idml/no-paragraph-style"
    - "idml/normalparagraphstyle"
  non_ci_colors: []
  non_ci_layers:
    - "Info"

example_pages:
  - { num: 1, label: "Cover" }
  - { num: 2, label: "Innenseite" }

preflight:
  bleed_mm: 2
  fold_mm: [99, 198]
  cmyk_only: true
  min_image_dpi: 300

slots:
  # Annames are IDML Self IDs (u-prefixed). Refactor to semantic slot names
  # (e.g. p1_cover_background) after first gallery review.
  # tools/idml_meta_stub.py regenerates this block.
