description: '3-fach Zickzackfalz A4-quer-Themenflyer mit grünem Cover. Imported from
  InDesign IDML via tools/idml_to_dsl.py — initial slot schema; refine after first
  gallery render. Annames are IDML Self IDs verbatim (u-prefixed); a human will refactor
  them to semantic slot names post-bootstrap.

  '
