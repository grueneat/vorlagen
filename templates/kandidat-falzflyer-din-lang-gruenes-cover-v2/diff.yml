# Visual-diff tolerance for kandidat-falzflyer-din-lang-gruenes-cover-v2.
# See docs/diff-tolerance.md for schema.
#
# Baseline source: originals/26-03-Leporello z-Falz 99x210 6-seitig gruenes
# Cover 2 Ordner/26-03-Leporello z-Falz 99x210 6-seitig gruenes Cover 2.pdf —
# the InDesign-exported reference PDF that the IDML converter targets.
#
# Phase 2 (issue 35) starting tolerances — same defaults as the Zeitung
# template uses for body-text-heavy pages. Per-region overrides are a
# follow-up (drive them off the bbox extractor from issue #36/PR #75
# rather than hand-picking them now).
#
# fuzz_pct=25 absorbs CI's missing-Gotham-Narrow substitution and
# Scribus's sub-pixel anti-aliasing drift. max_pixel_mismatch_pct=1.0
# is the project-wide spec; raise per-page only if a specific page
# turns out to need it after the first comparison run.
visual_diff:
  max_pixel_mismatch_pct: 1.0
  fuzz_pct: 25.0
  # Per-region grid (Backport 12 / Issue #37 P2): the per-cell metric
  # surfaces localised drift that the page-wide average washes out. 6×4
  # cells on a DIN-Lang Falzflyer page (~99×210mm) is roughly slot-sized
  # (~17×52mm per cell). No per_cell overrides yet — tune after the first
  # measurement pass.
  region_grid:
    cols: 6
    rows: 4
