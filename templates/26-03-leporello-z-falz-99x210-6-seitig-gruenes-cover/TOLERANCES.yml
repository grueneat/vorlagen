tolerances:
- id: tol:cross-renderer-line-wrap-structural
  audit: text_position_audit_structural
  classification: scribus-engine-bug
  reason: 'Scribus 1.6.x wraps paragraph text at different points than InDesign
    because Gotham Narrow / Vollkorn render a fraction wider per line in Scribus.
    Frames re-flow by a line, shifting every subsequent word and producing large
    word-position deltas (>5pt). The systematic text audit confirms the cause for
    most affected frames as "line count differs" (e.g. u16c baseline=5 vs preview=4,
    u3a2 baseline=3 vs preview=4, uf7 baseline=20 vs preview=19). This is intrinsic
    to the renderer font-metric difference and is not fixable at the converter or
    build.py level — the y_mm_shift and line_spacing playbooks cannot close a wrap
    re-flow. Same class settled at ~254-279 on the sibling Flyer templates; this
    6-panel Leporello settles at 60 structural drifts.'
  follow_up_issue: engine-bug; no upstream issue yet
  severity: cosmetic
  max_issues: 70
- id: tol:cross-renderer-line-wrap-jitter
  audit: text_position_audit_jitter
  classification: scribus-engine-bug
  reason: 'Sub-perceptible (<=5pt) word-position drift from the same Scribus vs
    InDesign font-metric difference described in
    tol:cross-renderer-line-wrap-structural. These are below the visible-shift
    threshold; accepted as renderer noise. Cap raised 30 -> 34 on the
    converter-fix-set re-import: the u1c7 y_mm_shift moved several words from the
    >5pt structural band into the 2-5pt jitter band (net structural -80,
    line_match -18). The pixel audit confirms 0 frames carry any remaining
    uniform vertical offset, so the jitter is irreducible at build.py level. See
    TOLERANCE_LOG.md 2026-05-19 row.'
  follow_up_issue: engine-bug; no upstream issue yet
  severity: cosmetic
  max_issues: 34
- id: tol:systematic-text-actionable-wrap
  audit: systematic_text_audit
  classification: scribus-engine-bug
  reason: '10 frames carry sim-actionable drift. The systematic audit attributes
    the majority to "line count differs — text wrapped differently" (u155, u16c,
    u2d5, u3a2, u3ba, uf7) which the line_spacing_sim cannot resolve (a leading
    override does not change the wrap point). u1b0/u1e6 are SPLIT offsets (per-
    paragraph anchor, signs differ across lines) and u1c7 is a uniform +1.92pt
    offset that the y_mm_shift playbook already addressed within its convergence
    band. Residual accepted as cross-renderer line-wrap.'
  follow_up_issue: engine-bug; no upstream issue yet
  severity: cosmetic
  max_issues: 12
