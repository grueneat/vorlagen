tolerances:
- id: tol:inventory-offpage-registration-marks
  audit: inventory
  classification: human-review
  severity: cosmetic
  max_issues: 2
  reason: '2 dropped elements. The converter deliberately skips two Rectangle
    elements — u141f (x=-25.8mm) and u1424 (x=-25.8mm), both 5.2x5.1mm — that
    the IDML places ~26mm off the left page edge. They are inline vector paths
    with no <Image>/<PDF> child (registration / colour-control furniture). The
    converter logs each as "[skip] Rectangle … entirely outside page bounds …
    InDesign design artifact, not emitted"; InDesign also omits them from the
    trimmed PDF export. A deliberate, documented non-emit — not a silent drop.'
  follow_up_issue: none; correct converter behaviour, audit is conservative
- id: tol:image-audit-vector-path-delta
  audit: image_audit
  classification: scribus-engine-bug
  severity: cosmetic
  max_issues: 45
  reason: '41 vector-path deltas, derivative of the Scribus raster/ICC rendering
    differences on full-bleed Dunkelgruen page backgrounds and photo content,
    plus the IDML inline decorative vector paths (curly quotes, Wahlkreis
    ellipse / underline ornaments) the converter extracts as inline images
    rather than re-emitting as Scribus Polygon items. Same gap class as the
    sibling flyer templates.'
  follow_up_issue: engine-bug; intrinsic raster + ICC differences
- id: tol:text-position-jitter-freetype-kerning
  audit: text_position_audit_jitter
  classification: scribus-engine-bug
  severity: cosmetic
  max_issues: 40
  reason: '31 sub-perceptible (<=5pt) per-word position drifts — FreeType-vs-
    InDesign per-character kerning jitter intrinsic to the two rasterisers. The
    y_mm_shift playbook found no reliable calibration frame and emitted only
    tentative recommendations; the line_spacing sim returned no rows for any
    frame. Sub-perceptible jitter, below the visible threshold. The structural
    bucket (text_position_audit_structural) catches the larger >5pt shifts.'
  follow_up_issue: engine-bug; intrinsic to FreeType rasterisation
- id: tol:text-position-structural-cross-renderer-wrap
  audit: text_position_audit_structural
  classification: scribus-engine-bug
  severity: structural
  max_issues: 260
  reason: '254 large (>5pt) word-position drifts, concentrated on pages 2-4.
    Verified page-by-page (rendered pages 3 and 4 at 150dpi vs baseline) that
    rendered content and frame geometry are correct; the drift is dominated by
    cross-renderer line-wrap differences — Scribus and InDesign break the
    justified body / bullet-list paragraphs at slightly different words because
    their font-metric and hyphenation models differ (page-3 bullet text fits 2
    lines in baseline, wraps to 3 in Scribus). One wrap-point difference
    cascades into dozens of downstream words counted as "drifted". Not a
    converter bug and not a routing bug (facing-pages routing verified: PDF
    page 3 shows "Ich bin auch eine Headline", matching the baseline). NOT
    FIXED, NOT TOLERATED-AS-PASSING — severity:structural keeps preflight red
    until a Scribus justification/hyphenation alignment lands or the baseline
    is re-flowed.'
  follow_up_issue: engine-bug; cross-renderer paragraph line-wrap divergence
- id: tol:systematic-text-line-count-divergence
  audit: systematic_text_audit
  classification: scribus-engine-bug
  severity: structural
  max_issues: 12
  reason: '12 frames flagged "line count differs" (e.g. u13cd baseline=5 vs
    preview=4, u13eb baseline=3 vs preview=2). Per-frame view of the same
    cross-renderer wrap divergence as text_position_audit_structural: when a
    paragraph wraps to a different number of lines, the systematic audit
    reports it as un-addressed sim-actionable drift. The line_spacing playbook
    ran line_spacing_sim on all 12 frames and returned no rows for any of them,
    so no (LINESPMode, LINESP) override is derivable. NOT FIXED, NOT TOLERATED-
    AS-PASSING — severity:structural keeps preflight red.'
  follow_up_issue: engine-bug; cross-renderer line-wrap (same root cause as
    structural text-position drift)
- id: tol:image-content-leonore-cmyk-psd-conversion
  audit: image_content_audit
  classification: authoring-bug
  severity: structural
  max_issues: 1
  reason: 'Page-6 portrait u145b renders with heavily distorted colours
    (posterized blue/magenta/yellow instead of a natural portrait).
    image_content_audit flags mean_color_shift (mean_delta_rgb 78.0) and
    hist_divergence (0.28). Root cause: the source link "2026-03-Leonore fuer
    Flyer.psd" is a CMYK-mode Photoshop document, and the Stage-1 asset
    pipeline (links_export.yml recipe "convert -flatten") flattened it to RGB
    PNG WITHOUT an ICC-aware CMYK->RGB conversion. The frame itself renders and
    is positioned correctly (image_frame_visibility_audit reports it ok,
    visibility_ratio 2.09) — only the pixel colours are wrong. Documented
    shared PSD->PNG CMYK->RGB conversion bug confirmed on batch templates 1-2.
    Fix is upstream in tools/links_export.py (recipe needs an ICC CMYK->RGB
    step), NOT a converter or build.py edit. NOT FIXED, NOT TOLERATED-AS-
    PASSING — severity:structural keeps preflight red.'
  follow_up_issue: authoring; tools/links_export.py raster_psd recipe needs an
    ICC-aware CMYK->RGB conversion step
- id: tol:visual-diff-image-size-mismatch
  audit: visual_diff_regions
  classification: scribus-engine-bug
  severity: cosmetic
  max_issues: 0
  reason: 'visual_diff_regions errors with "image size mismatch: baseline=(620,
    874), preview=(621, 875)" — a 1-pixel difference in each dimension. Scribus
    pdftocairo rasterisation rounds the trim-box page size to a slightly
    different pixel count than the InDesign baseline export at the same DPI.
    The functional diff signal is covered by visual_diff and the per-region
    audits; the phase surfaces the rounding honestly rather than coercing
    dimensions. This surfaces as a phase ERROR (not an audit issue); preflight
    treats any errors-dict entry as a hard red regardless of tolerances, so
    this entry is documentation only. Same artefact on the sibling templates.'
  follow_up_issue: engine-bug; pdftocairo vs InDesign rasterisation DPI rounding
