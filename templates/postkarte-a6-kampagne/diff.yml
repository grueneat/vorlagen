# Visual-diff tolerance for the Postkarte A6 reproduction.
# See docs/diff-tolerance.md for schema.
#
# 2-page A6 postcard. After honouring HCMS=1 + ICC profile state and the
# consecutive-empty-paragraph round-trip fix in the converter, both pages
# render byte-clean (~0.0001% mismatch) against the baseline. No per-page
# overrides needed.
#
# fuzz_pct=5 is the project-wide cap (issue prompt: "max fuzz is 5%").
visual_diff:
  max_pixel_mismatch_pct: 1.0
  fuzz_pct: 5.0
