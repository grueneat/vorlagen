id: postkarte-a6-kampagne
version: 0.2.0
title: Kampagnen-Postkarte A6
format: A6
orientation: portrait
pages: 2
preview_dpi: 100
audience: [bezirksgruppe, landesgruppe, ortsgruppe]
description: >
  Zweiseitige Kampagnen-Postkarte A6 mit Hauptbotschaft, Störer (Badge),
  Call-to-Action, QR-Code-Rückseite mit Impressum. Skelett-Vorlage —
  in Scribus öffnen, eigene Inhalte einsetzen.

# Source-of-truth is build.py. The template.sla in this folder is a build
# artifact regenerable via `python3 build.py`. Recommended workflow:
#  - Open template.sla in Scribus
#  - Replace placeholder content (text and images)
#  - Save under a new name (e.g. postkarte-a6-klimaschutz.sla)
build:
  script: build.py
  output: template.sla

# Round-trip validation (issue #2): structural-diff target, plus the per-template
# overrides for `tools/check_ci.py` allowing the document-local non-CI styles and
# colors that the original Postkarte ships with.
original_sla: ../../postkarte-vorlage-original.sla
previews_for_sla: 988fefe04151d2dedb731cd44b7e5a52e0c9e59cd8960df07844871afa4f9174

# Issue #12 — brand_overrides (see shared/brand/SPEC-WRITING-GUIDE.md).
brand_overrides:
  - id: brand:line_spacing_0.9
    reason: >-
      Production template auto-generated from postkarte-vorlage-original.sla;
      the original's per-template para-styles drift from Quickguide 0.9 factor
      (e.g. Fließtext 13/12=1.083, Headline sehr wichtig 23/27=0.85). Round-
      trip diff (tools/sla_diff.py --strict) is the byte-stable contract for
      this template; tightening linesp would break round-trip.
  - id: brand:undeclared_alignment_drift
    reason: >-
      Per-template alignment encoding scheduled for the #22 follow-up.
      Spine-safety is a no-op (single-page-per-side template) and the new
      rule infrastructure ships globally in #22; CONSTRAINTS encoding for
      this template is deferred (Issue #22 locked decision #12).
ci_overrides:
  non_ci_styles:
    - "Default Paragraph Style"
    - "Fließtext"
    - "Impressum"
    - "Default Paragraph Style (2)"
    - "Schrift rosa Kreis"
    - "Headline sehr wichtig"
    - "Kontaktmöglichkeiten"
    - "Vollkorn Headline sehr wichtig"
    - "Unterüberschrift"
  non_ci_colors:
    - "Green"

# Slots are documented hints for editors, not fill-targets.
# Each slot's ANNAME (visible in Scribus's Object Properties panel) names
# the frame so users can find the right element to edit.
slots:
  headline:
    type: text
    description: 4-zeilige Hauptbotschaft (Vorderseite, alternierend Weiß/Gelb)
    lines: 4
    max_chars_per_line: 22
    anname: "Headline 4-zeilig (Brand-Wechselfarbe)"
  cta:
    type: text
    description: Call-to-Action unter Headline (1 Zeile)
    anname: "CTA"
  stoerer:
    type: text
    description: 3-zeiliger Störer-Text im Magenta-Kreis
    lines: 3
    anname: "Störer-Text 3-zeilig"
  body:
    type: text
    description: Erklärtext auf der Rückseite
    multiline: true
    anname: "Erklärtext Rückseite"
  url:
    type: text
    description: Kampagnen-URL unterm QR-Code
    pattern: "^https?://"
    anname: "Kampagnen-URL"
  social:
    type: text
    description: Social-Handles (4 Zeilen)
    lines: 4
    anname: "Social Handles (4-zeilig)"
  impressum:
    type: text
    description: Impressum-Block, gesetzlich vorgeschrieben
    multiline: true
    anname: "Impressum (1-zeilig)"
  hero:
    type: image
    description: Hauptbild Vorderseite (optional, sonst Vollfarbe)
    optional: true
  logo:
    type: image
    description: Grünen-Logo (Vorderseite, zentriert unten)
    source: shared/logos/gruene-weiss.png
    anname: "Logo Grüne (weiss, zentriert)"
  qr:
    type: image
    description: QR-Code zum Kampagnen-URL (kann manuell eingefügt werden)
    anname: "QR-Code (wird aus URL generiert)"

preflight:
  bleed_mm: 3
  cmyk_only: true
  min_image_dpi: 300
