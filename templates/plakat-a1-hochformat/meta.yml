id: plakat-a1-hochformat
version: 0.1.0
title: Event-Plakat A1
type: single
audience: [bezirksgruppe, landesgruppe, ortsgruppe]
description: >
  Veranstaltungs-Plakat für Events, Mahnwachen, Stammtische, Kundgebungen.
  A1 Hochformat (594×841 mm). Für andere Druckgrößen direkt im Druckdialog
  skalieren — die Vektor-Inhalte bleiben dabei verlustfrei.
build:
  script: build.py
  output: template.sla

# Round-trip validation (issue #2)
original_sla: ../../plakat-a1-hochformat-original.sla
previews_for_sla: cff461714e044eb343b7593bf7b0de2d40a5bb38a458d62db80359748902a3b4
ci_overrides:
  non_ci_styles:
    - "Default Paragraph Style"
    - "Headlineweiß"
    - "Überschrift gelb"
    - "Fließtext"
    - "Impressum"
  non_ci_colors: []

slots:
  headline:
    type: text
    description: 4-zeilige Event-Headline (alternierend Weiß/Gelb)
    lines: 4
    anname: "Headline 4-zeilig (Brand-Wechselfarbe)"
  date:
    type: text
    description: Datum (z.B. "Samstag, 15. Mai")
    anname: "Veranstaltung — Datum/Zeit"
  venue:
    type: text
    description: Veranstaltungsort + Adresse
    anname: "Veranstaltung — Ort/Adresse"
  url:
    type: text
    description: Anmelde- oder Info-URL
    pattern: "^(https?://)?[a-z0-9.-]+"
    anname: "Anmelde-URL"
  logo:
    type: image
    description: Grünen-Logo (rechts oben)
    source: shared/logos/gruene-weiss.png
    anname: "Logo (top-right, weiss)"
  impressum:
    type: text
    description: Impressum (vertikal am rechten Rand)
    anname: "Impressum (vertikal)"

preflight:
  bleed_mm: 3
  cmyk_only: true
