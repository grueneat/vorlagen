id: plakat-a1-hochformat
version: 0.1.0
title: Event-Plakat A1
type: single
audience: [bezirksgruppe, landesgruppe, ortsgruppe]
description: >
  Veranstaltungs-Plakat für Events, Mahnwachen, Stammtische, Kundgebungen.
  A1 Hochformat (594×841 mm). Für andere Druckgrößen direkt im Druckdialog
  skalieren — die Vektor-Inhalte bleiben dabei verlustfrei.
build:
  script: build.py
  output: template.sla

# Round-trip validation (issue #2)
original_sla: ../../plakat-a1-hochformat-original.sla
previews_for_sla: b3024d3249bcdcaac923ed4c77c9446f6905c5f87ef93c2ac068743de2889b76

# Issue #12 — brand_overrides (see shared/brand/SPEC-WRITING-GUIDE.md).
brand_overrides:
  - id: brand:line_spacing_0.9
    reason: >-
      Production template auto-generated from plakat-a1-hochformat-original.sla;
      the original Plakat carries Headlineweiß linesp=150/fontsize=160 (0.94x)
      and Impressum linesp=20/fontsize=20 (1.0x). Round-trip diff (tools/sla_
      diff.py --strict) is the byte-stable contract; modifying linesp would
      break round-trip.
  - id: brand:undeclared_alignment_drift
    reason: >-
      Per-template alignment encoding scheduled for the #22 follow-up.
      Spine-safety is a no-op (single-page template) and the new rule
      infrastructure ships globally in #22; CONSTRAINTS encoding for
      this template is deferred (Issue #22 locked decision #12).
ci_overrides:
  non_ci_styles:
    - "Default Paragraph Style"
    - "Headlineweiß"
    - "Überschrift gelb"
    - "Fließtext"
    - "Impressum"
  non_ci_colors: []

slots:
  headline:
    type: text
    description: 4-zeilige Event-Headline (alternierend Weiß/Gelb)
    lines: 4
    anname: "Headline 4-zeilig (Brand-Wechselfarbe)"
  date:
    type: text
    description: Datum (z.B. "Samstag, 15. Mai")
    anname: "Veranstaltung — Datum/Zeit"
  venue:
    type: text
    description: Veranstaltungsort + Adresse
    anname: "Veranstaltung — Ort/Adresse"
  url:
    type: text
    description: Anmelde- oder Info-URL
    pattern: "^(https?://)?[a-z0-9.-]+"
    anname: "Anmelde-URL"
  logo:
    type: image
    description: Grünen-Logo (rechts oben)
    source: shared/logos/gruene-weiss.png
    anname: "Logo (top-right, weiss)"
  impressum:
    type: text
    description: Impressum (vertikal am rechten Rand)
    anname: "Impressum (vertikal)"

preflight:
  bleed_mm: 3
  cmyk_only: true
