tolerances:
- id: tol:text-position-structural-cross-renderer-wrap
  audit: text_position_audit_structural
  classification: scribus-engine-bug
  severity: structural
  max_issues: 260
  reason: '253 large (>5pt) word-position drifts. Verified page-by-page (pages
    1, 5, 6) that rendered content and frame geometry are correct; the drift
    is dominated by cross-renderer line-wrap differences — Scribus and InDesign
    break the justified body / bullet-list paragraphs at slightly different
    words because their font-metric and hyphenation models differ. One
    wrap-point difference flips a word from end-of-line to start-of-line
    (dx ~= -160..-187pt) and cascades into dozens of downstream words counted
    as "drifted". Not a converter bug and not a routing bug. NOT FIXED, NOT
    TOLERATED-AS-PASSING — preflight stays red until a Scribus
    justification/hyphenation alignment lands or the baseline is re-flowed.
    253 this combined-fidelity re-render vs 254 the prior overnight run —
    stable, no regression.'
  follow_up_issue: engine-bug; cross-renderer paragraph line-wrap divergence
- id: tol:text-position-jitter-suppressed
  audit: text_position_audit_jitter
  classification: scribus-engine-bug
  severity: cosmetic
  max_issues: 35
  reason: '19 sub-perceptible (<=5pt) per-word position drifts (30 the prior
    overnight run). The y_mm_shift playbook reported "no reliable calibration
    frame (no line-count match)" and emitted only tentative recommendations —
    no deterministic shift could be derived. Sub-perceptible jitter, below the
    visible threshold. This audit is GREEN under the cap.'
  follow_up_issue: playbook-extension; y_mm_shift needs a no-calibration-frame path
- id: tol:systematic-text-line-wrap-no-sim-rows
  audit: systematic_text_audit
  classification: scribus-engine-bug
  severity: structural
  max_issues: 11
  reason: '9 frames flagged sim-actionable (10 the prior overnight run). The
    line_spacing playbook simulator (tools/line_spacing_sim.py) returned NO ROWS
    for every frame — the drift is line-WRAP-count divergence, not a leading
    value. line_spacing_pixel_audit confirms line-count mismatches (u1242
    16->17, u129e 10->9, u12b5 11->12). No single (LINESPMode, LINESP)
    reconciles a wrap-count difference. The per-line GAP is correct in both
    renderers (baseline gaps 13.9-14.9pt == preview gaps 13.9-14.9pt).'
  follow_up_issue: engine-bug; cross-renderer line-wrap (same root cause as text_position_audit)
- id: tol:visual-diff-regions-text-driven
  audit: visual_diff_regions
  classification: scribus-engine-bug
  severity: cosmetic
  max_issues: 65
  reason: '59 hot regions, all text-driven. The worst region on every page is a
    body-TEXT band (page 0 row1 18.3%, page 2 row1 22.6%, page 4 row2 25.6%) —
    NOT a photo band. This is the intended outcome of the image-fidelity
    re-render: image frames no longer dominate the hot regions. Derivative of
    the cross-renderer line-wrap. The audit no longer phase-errors (the
    dcc52c7 raster-rounding tolerance fix resolved the pre-existing 1-pixel
    size-mismatch ValueError).'
  follow_up_issue: engine-bug; cross-renderer line-wrap surfaces as region mismatch
- id: tol:image-frame-visibility-radial-gradient-cmyk-tone
  audit: image_frame_visibility_audit
  classification: human-review
  severity: cosmetic
  max_issues: 1
  reason: 'Frame u1386 (Schwarzer Verlauf radial) renders faint
    (visibility_ratio 0.681) — the radial vignette is present but lighter than
    baseline. This is the small residual CMYK->sRGB tone shift on the dark PSD
    that the image-fidelity re-render brief explicitly classifies as
    acceptable. The audit overall verdict is ok (0 invisible). The prior run
    shipped this asset as a fully broken cyan blob (image_content_audit
    mean_delta_rgb 102.8); the de96b7c ICC-aware CMYK conversion brought it to
    mean_delta_rgb 4.2 — content correct, a faint tone residual remains.'
  follow_up_issue: tooling; residual CMYK->sRGB tone shift on dark PSDs
- id: tol:image-audit-vector-path-delta
  audit: image_audit
  classification: scribus-engine-bug
  severity: cosmetic
  max_issues: 45
  reason: '39 vector-path deltas, derivative of the Scribus image-rendering
    differences plus brand-colour ICC profile shifts on full-bleed Dunkelgruen
    / photo content. Within the cap — this audit is GREEN.'
  follow_up_issue: engine-bug; intrinsic raster + ICC differences
