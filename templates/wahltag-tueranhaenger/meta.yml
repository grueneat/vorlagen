id: wahltag-tueranhaenger
version: 0.1.0
title: Wahltag-Türanhänger
format: custom
custom_size_mm: [105, 250]
orientation: portrait
pages: 2
preview_dpi: 100
audience: [bezirksgruppe, ortsgruppe, kandidat]
description: >
  Vertikaler Türanhänger 105×250 mm mit 35-mm-Loch-Stanzform für Türklinken-
  Aufhängung. Vorderseite Wahlkreuz-Hero auf Hellgrün-Band, Headline „Heute ist
  Wahltag — Wähle Grün". Rückseite Kandidat-Portrait + Name + Position + Kontakt.
  Stanzkontur als Spot-Color-Pfad für die Druckerei.

build:
  script: build.py
  output: template.sla

previews_for_sla: 0fdaed8c3cf3d62337f2d7271e24628b3447e8c6d50850f197060511e19e82cb
ci_overrides:
  non_ci_styles:
    - "tueranhaenger/headline"
    - "tueranhaenger/sub"
    - "tueranhaenger/body"
    - "tueranhaenger/cand-name"
    - "tueranhaenger/cand-pos"
    - "tueranhaenger/url"
    - "tueranhaenger/impressum"
  non_ci_colors:
    - "Stanzkontur"      # document-local spot color (D4 revised)
  non_ci_layers:
    - "Stanzkontur"      # document-local layer

slots:
  brand_bar_front:
    type: shape
    description: Dunkelgrün-Brand-Bar oben (lässt weißes Logo sichtbar)
    anname: "Brand-Bar (Vorderseite)"
  hellgruen_band:
    type: shape
    description: Hellgrün-Band hinter Wahlkreuz (D12)
    anname: "Hellgrün-Band (Wahlkreuz)"
  wahlkreuz_hero:
    type: image
    description: Wahlkreuz-Hero auf Hellgrün-Band (50×50 mm)
    source: shared/assets/wahlkreuz.png
    anname: "Wahlkreuz (Hero)"
  headline_wahltag:
    type: text
    description: 2-zeilige Headline „Heute ist / Wahltag." (28pt Vollkorn Italic)
    anname: "Headline-Wahltag"
  sub_headline:
    type: text
    description: Sub „Wähle Grün." (18pt Gotham Bold)
    anname: "Sub-Headline"
  bullet_liste:
    type: text
    description: 3-zeilige Bullet-Liste mit Botschaften
    anname: "Bullet-Liste"
  impressum:
    type: text
    description: Mediengesetz §24 Impressum (front)
    anname: "Impressum"
  stanzkontur:
    type: shape
    description: Stanzkontur (Außen 105×250 + 35-mm-Loch zentriert)
    anname: "Stanzkontur Außen"
  brand_bar_back:
    type: shape
    description: Dunkelgrün-Brand-Bar oben (Rückseite)
    anname: "Brand-Bar (Rückseite)"
  kandidat_portrait:
    type: image
    description: Kandidat-Portrait (optional, Codex demo per D11)
    optional: true
    anname: "Kandidat-Portrait"
  kandidat_name:
    type: text
    description: Kandidat-Name (14pt Gotham Bold Dunkelgrün)
    anname: "Kandidat-Name"
  kandidat_position:
    type: text
    description: Kandidat-Position (10pt Gotham Italic)
    anname: "Kandidat-Position"
  kontakt_url:
    type: text
    description: Kandidaten-URL (11pt Gotham Bold Dunkelgrün)
    anname: "Kontakt-URL"
  kontakt_info:
    type: text
    description: Kontakt-Email + Telefon
    anname: "Kontakt-Info"
  impressum_back:
    type: text
    description: Impressum (back, gleicher Text wie Vorderseite)
    anname: "Impressum (back)"

example_pages:
  - { num: 1, label: "Vorderseite — Wahlkreuz + Headline + Bullets" }
  - { num: 2, label: "Rückseite — Kandidat-Info + Kontakt" }

samples:
  - id: kandidat-portrait
    description: "Optional candidate portrait for back side (generated via tools/codex_image_gen.py)"

preflight:
  bleed_mm: 2
  cmyk_only: true
  min_image_dpi: 300
  cut_layer: "Stanzkontur"
  cut_layer_alternative: "CutContour"  # international printers
