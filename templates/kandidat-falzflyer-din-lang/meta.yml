id: kandidat-falzflyer-din-lang
version: 0.1.0
title: Kandidat-Falzflyer DIN-lang
format: A4
orientation: landscape
pages: 2
preview_dpi: 100
audience: [kandidat, bezirksgruppe, ortsgruppe]
description: >
  3-fach gefalzter A4-quer-Kandidaten-Flyer (Zickzackfalz, 6 Panele à 99×210 mm).
  Cover (Portrait + Name + Slogan) → Teaser → Closer (Wahlkreuz auf Dunkelgrün).
  Rückseite: 4 Themen-Module + Kontakt + Impressum.

build:
  script: build.py
  output: template.sla

previews_for_sla: 2f0251e17b844f99ec4eb721578e77e9296c365fb771b964d0dc6412484f2c4a

# Issue #12 — brand_overrides (see shared/brand/SPEC-WRITING-GUIDE.md).
brand_overrides:
  - id: brand:line_spacing_0.9
    reason: >-
      Shared with all templates: CI palette ratios drift; per-template panel
      styles use slightly looser line-heights (e.g. teaser-body 14/11=1.27x)
      to keep narrow 99mm panels readable. Brand-team review pending.
  - id: brand:logo_size_3M
    reason: >-
      Falzflyer has 3 logos across 6 panels: P1 (cover) Logo at 20mm anchors
      the brand on the cover (3*M = 37.80mm would dominate the candidate
      portrait), P2 small logo at 16mm fits inside the teaser-body left
      column, P6 back-cover logo at 17mm balances the closer Wahlkreuz hero.
      All three are intentional smaller-than-3M choices for narrow-panel
      composition.
  - id: brand:visual_adjacency_drift
    reason: >-
      V1 layout work in #21 owns alignment encoding for this template.
      Re-enable once V1 lands and a CONSTRAINTS list captures the
      declared adjacencies (Issue #22 locked decision #9). Issue #23
      renamed brand:undeclared_alignment_drift -> brand:visual_adjacency_drift.
  - id: brand:image_text_overlap
    reason: >-
      Scheduled for follow-up audit per #23 — caption-on-photo / decorative
      overlaps audited at time of #23, not yet reviewed for fix-vs-override
      classification.
ci_overrides:
  non_ci_styles:
    - "falzflyer/cand-name"
    - "falzflyer/slogan"
    - "falzflyer/teaser-headline"
    - "falzflyer/teaser-body"
    - "falzflyer/closer-headline"
    - "falzflyer/closer-datum"
    - "falzflyer/closer-url"
    - "falzflyer/thema-headline"
    - "falzflyer/thema-body"
    - "falzflyer/contact-headline"
    - "falzflyer/contact-body"
    - "falzflyer/impressum"
  non_ci_colors:
    - "Falz"
  non_ci_layers:
    - "Falz"

slots:
  p1_kandidat_portrait:
    type: image
    description: Kandidat-Portrait Cover (Codex demo per D11)
    optional: true
    anname: "P1 Kandidat-Portrait"
  p1_kandidat_name:
    type: text
    description: Kandidat-Name (24pt Vollkorn Italic Dunkelgrün)
    anname: "P1 Kandidat-Name"
  p1_slogan:
    type: text
    description: Slogan 2 Zeilen (14pt Gotham Bold)
    anname: "P1 Slogan"
  p2_teaser_headline:
    type: text
    anname: "P2 Teaser-Headline"
  p2_teaser_body:
    type: text
    anname: "P2 Teaser-Body"
  p3_hintergrund:
    type: shape
    description: Dunkelgrün-Vollbild Closer-Panel (D12 Wahlkreuz background)
    anname: "P3 Hintergrund"
  p3_wahlkreuz:
    type: image
    description: Wahlkreuz Hero auf Dunkelgrün
    source: shared/assets/wahlkreuz.png
    anname: "P3 Wahlkreuz"
  p3_closer_headline:
    type: text
    description: Wahlaufruf-Headline (22pt Gotham Bold White) — "Wähle Grün am [Datum]"
    anname: "P3 Closer-Headline"
  p3_datum_akzent:
    type: text
    description: Datum als Vollkorn-Italic-Gelb-Akzent
    anname: "P3 Datum-Akzent"
  p3_url:
    type: text
    description: Kandidaten-URL
    anname: "P3 URL"
  falz_x99_front:
    type: shape
    description: Falz-Linie x=99 mm vorne
    anname: "Falz x=99 (Front)"
  falz_x198_front:
    type: shape
    description: Falz-Linie x=198 mm vorne
    anname: "Falz x=198 (Front)"
  p4_thema1_headline:
    type: text
    anname: "P4 Thema 1 — Headline"
  p4_thema1_body:
    type: text
    anname: "P4 Thema 1 — Body"
  p4_thema2_headline:
    type: text
    anname: "P4 Thema 2 — Headline"
  p4_thema2_body:
    type: text
    anname: "P4 Thema 2 — Body"
  p5_thema3_headline:
    type: text
    anname: "P5 Thema 3 — Headline"
  p5_thema3_body:
    type: text
    anname: "P5 Thema 3 — Body"
  p5_thema4_headline:
    type: text
    anname: "P5 Thema 4 — Headline"
  p5_thema4_body:
    type: text
    anname: "P5 Thema 4 — Body"
  p6_kontakt_headline:
    type: text
    anname: "P6 Kontakt-Headline"
  p6_kontakt_adresse:
    type: text
    anname: "P6 Kontakt-Adresse"
  p6_kontakt_email_tel:
    type: text
    anname: "P6 Kontakt-Email-Tel"
  p6_qr_code:
    type: image
    description: QR-Code (optional, generated)
    optional: true
    anname: "P6 QR-Code"
  p6_impressum:
    type: text
    anname: "P6 Impressum"
  falz_x99_back:
    type: shape
    anname: "Falz x=99 (Back)"
  falz_x198_back:
    type: shape
    anname: "Falz x=198 (Back)"

example_pages:
  - { num: 1, label: "Front: Cover (P1) — Teaser (P2) — Closer (P3)" }
  - { num: 2, label: "Back: Themen 1+2 (P4) — 3+4 (P5) — Kontakt (P6)" }

samples:
  - id: kandidat-portrait
    description: "Kandidat-Portrait fürs Cover (Codex DALL-E generated, 768x1024)"

preflight:
  bleed_mm: 3
  fold_mm: [99, 198]
  cmyk_only: true
  min_image_dpi: 300
