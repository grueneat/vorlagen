name: Build & Deploy Gallery

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Install Scribus 1.6.5 from the official AppImage (Ubuntu repos ship
      # 1.5.8 which cannot read 1.6.x SLA files; the Debian trixie route
      # fails on Ubuntu runners because the trixie GPG keys aren't bundled).
      # The AppImage is extracted so libfuse2 isn't required at runtime.
      - name: Install Scribus 1.6.5 + headless deps
        env:
          SCRIBUS_VERSION: 1.6.5
          SCRIBUS_URL: https://master.dl.sourceforge.net/project/scribus/scribus/1.6.5/scribus-1.6.5-linux-x86_64.AppImage?viasf=1
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq \
            xvfb poppler-utils ghostscript python3-lxml python3-yaml
          # Download + extract AppImage (no FUSE required when extracted)
          sudo curl -fsSL -o /opt/scribus.AppImage "$SCRIBUS_URL"
          sudo chmod +x /opt/scribus.AppImage
          cd /opt
          sudo /opt/scribus.AppImage --appimage-extract >/dev/null
          # Provide a wrapper that points to the extracted AppRun
          printf '#!/bin/sh\nexec /opt/squashfs-root/AppRun "$@"\n' \
            | sudo tee /usr/local/bin/scribus >/dev/null
          sudo chmod +x /usr/local/bin/scribus
          # Sanity: writes "Scribus 1.6.5" then exits non-zero on headless
          # because Qt can't find a display; that's fine, we use xvfb-run.
          xvfb-run -a --server-args="-screen 0 800x600x24" \
            scribus --version 2>&1 | head -3 || true

      - name: Build all templates via DSL
        run: |
          for build in templates/_smoke/*/build.py templates/*/build.py; do
            [ -f "$build" ] && python3 "$build"
          done

      - name: Generate gallery content (PDFs + PNG previews)
        run: python3 tools/gallery_build.py

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install Astro deps
        working-directory: site
        run: npm ci --no-audit --no-fund

      - name: Build Astro site
        working-directory: site
        run: npm run build

      - name: Run unit tests
        run: python3 -m unittest discover tools/sla_lib/tests

      - name: Run brand validator
        run: |
          for sla in templates/*/template.sla templates/*/*.sla; do
            [ -f "$sla" ] && python3 tools/check_ci.py "$sla" || true
          done

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
