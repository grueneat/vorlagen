name: Build & Deploy Gallery

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'tools/**'
      - 'templates/**'
      - 'shared/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Install Scribus 1.6.5 from the official AppImage (Ubuntu repos ship
      # 1.5.8 which cannot read 1.6.x SLA files; the Debian trixie route
      # fails on Ubuntu runners because the trixie GPG keys aren't bundled).
      # The AppImage is extracted so libfuse2 isn't required at runtime.
      # Cache the extracted Scribus AppImage to avoid the ~30s download on
      # every run. Keyed by version so a bump invalidates automatically.
      - name: Cache Scribus AppImage
        id: scribus-cache
        uses: actions/cache@v4
        with:
          path: /opt/squashfs-root
          key: scribus-1.6.5-appimage-v1

      - name: Install Scribus 1.6.5 + headless deps
        env:
          SCRIBUS_VERSION: 1.6.5
          SCRIBUS_URL: https://master.dl.sourceforge.net/project/scribus/scribus/1.6.5/scribus-1.6.5-linux-x86_64.AppImage?viasf=1
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq \
            xvfb poppler-utils ghostscript imagemagick python3-lxml python3-yaml \
            libzbar0 zbar-tools
          # Pillow + qrcode + pyzbar + jsonschema required by tools/qr_gen.py,
          # tools/codex_image_gen.py, tools/sla_lib/builder/library.py and tests
          # (issues #11, #13).
          # --ignore-installed sidesteps apt-installed python3-jsonschema
          # (Debian's variant lacks pip RECORD, blocking version upgrade).
          sudo pip install --break-system-packages --ignore-installed --no-cache-dir \
            "Pillow==12.2.0" "qrcode[pil]==8.2" "pyzbar==0.1.9" "jsonschema==4.26.0" \
            "fonttools==4.63.0"
          # Download + extract AppImage if not restored from cache
          if [ ! -d /opt/squashfs-root ]; then
            sudo curl -fsSL -o /opt/scribus.AppImage "$SCRIBUS_URL"
            sudo chmod +x /opt/scribus.AppImage
            cd /opt
            sudo /opt/scribus.AppImage --appimage-extract >/dev/null
          fi
          # Provide a wrapper that points to the extracted AppRun
          printf '#!/bin/sh\nexec /opt/squashfs-root/AppRun "$@"\n' \
            | sudo tee /usr/local/bin/scribus >/dev/null
          sudo chmod +x /usr/local/bin/scribus
          # Sanity: writes "Scribus 1.6.5" then exits non-zero on headless
          # because Qt can't find a display; that's fine, we use xvfb-run.
          xvfb-run -a --server-args="-screen 0 800x600x24" \
            scribus --version 2>&1 | head -3 || true

      - name: Build smoke templates via DSL
        # Smoke templates (_smoke/) are rebuilt fresh in CI as a sanity check
        # of the DSL surface. Production templates under templates/<slug>/ are
        # NOT rebuilt: their template.sla is the committed source of truth and
        # cross-environment lxml version drift produces non-deterministic
        # bytes. check_stale_previews validates SHA(template.sla) ==
        # meta.yml::previews_for_sla using the committed bytes directly.
        run: |
          for build in templates/_smoke/*/build.py; do
            [ -f "$build" ] && python3 "$build"
          done

      - name: Generate gallery content (PDFs + PNG previews)
        run: python3 tools/gallery_build.py

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install Astro deps
        working-directory: site
        run: npm ci --no-audit --no-fund

      - name: Build Astro site
        working-directory: site
        run: npm run build

      - name: Run unit tests
        run: python3 -m unittest discover tools/sla_lib/tests

      - name: Validate reproductions (sla_diff + stale-previews)
        run: |
          set -euo pipefail
          mkdir -p build/validation
          # Preflight: gallery previews must match committed template.sla bytes.
          # See docs/render-fidelity.md "Local-only rendering" — CI never renders templates.
          python3 bin/check-stale-previews
          for tdir in templates/postkarte-a6-kampagne templates/plakat-a1-hochformat templates/zeitung-a4; do
            tid=$(basename "$tdir")
            # Resolve original_sla relative to the template directory and read
            # the per-template `sla_diff_strict` opt-out flag (see issue #16:
            # zeitung intentionally diverges from the upstream original to fix
            # frame-attachment bugs).
            read original strict <<<"$(python3 -c "
          import os, sys, yaml
          m = yaml.safe_load(open('$tdir/meta.yml'))
          rel = m.get('original_sla', '')
          if not rel:
              sys.exit('no original_sla in meta.yml')
          print(os.path.normpath(os.path.join('$tdir', rel)),
                'true' if m.get('sla_diff_strict', True) else 'false')
          ")"
            if [ "$strict" != "true" ]; then
              echo "=== sla_diff $tid: SKIPPED (sla_diff_strict=false in meta.yml) ==="
              continue
            fi
            mkdir -p "build/validation/$tid"
            echo "=== sla_diff $tid ==="
            python3 tools/sla_diff.py \
              --left "$original" \
              --right "$tdir/template.sla" \
              --json "build/validation/$tid/sla_diff.json" \
              --strict \
              --allow-brand-extras
          done

      - name: Run brand validator
        run: |
          for sla in templates/*/template.sla templates/*/*.sla; do
            [ -f "$sla" ] && python3 tools/check_ci.py "$sla" || true
          done

      - name: Run structural check (Issue #12)
        # Walks each template's build_doc(), evaluates module-level CONSTRAINTS
        # and global BRAND_CONSTRAINTS list, honours meta.yml::brand_overrides.
        # Performance budget: <30s for all 8 templates (CONTEXT D11).
        run: |
          set -euo pipefail
          PYTHONPATH=tools python3 -m sla_lib.builder.structural_check --all

      - name: Run out-of-bounds audit (printable-area enforcement)
        # No PAGEOBJECT may sit (almost) entirely outside page+bleed. IDML
        # pasteboard cruft is pruned/clamped in Document.save(); this gate
        # fails CI if any off-page object slips through.
        run: |
          set -euo pipefail
          PYTHONPATH=tools python3 tools/out_of_bounds_audit.py --all

      - name: Run alignment audit (Issue #22, informational)
        # Heuristic alignment audit. Always informational — `|| true` keeps
        # the step from failing CI on warnings. Promotion to fatal is
        # deferred per Issue #22 locked decision #10 until enough
        # production templates are encoded.
        run: |
          mkdir -p build/audit
          PYTHONPATH=tools python3 tools/audit_alignment.py --all \
            --output-dir build/audit/ || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: audit-alignment-report
          path: build/audit/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
