name: SOP Enforcement (issue #38)

# Lightweight CI run that exercises the issue-#38 SOP gates on every push
# and pull request. Runs unit + relevant integration tests + the four
# mechanical SOP linters.
#
# The gallery build remains in .github/workflows/pages.yml; this workflow
# is intentionally cheap (no Scribus, no AppImage) so it provides fast
# feedback on PRs that touch only tools/, templates/<slug>/inject.yml,
# templates/<slug>/meta.yml, etc.

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'tools/**'
      - 'templates/**'
      - 'shared/**'
      - 'tests/**'
      - '.github/workflows/ci.yml'
      - '.pre-commit-config.yaml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sop-enforcement:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # check_overrides_growth needs the merge-base; full fetch is
          # required for the diff to find the base commit.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements-ci.txt

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          # --prefer-binary avoids long source builds for SimpleIDML / lxml.
          # Caching via setup-python turns this step into a no-op on warm runs.
          pip install --prefer-binary -r requirements-ci.txt

      - name: SOP gates
        run: |
          set -e
          python3 tools/sop_lint.py
          python3 tools/check_overrides_growth.py --base-ref origin/main || true  # transitional during initial roll-out
          python3 tools/lint_inject_consistency.py
          for d in templates/*/; do
            slug=$(basename "$d")
            if [ -f "$d/inject.yml" ] && [ -f "$d/build.py.generated" ]; then
              python3 tools/reconcile_build_py.py "$slug" --check
            fi
          done

      - name: Run unit tests
        run: |
          pytest tests/unit/ -q --ignore=tests/unit/test_idml_strict_mode.py
