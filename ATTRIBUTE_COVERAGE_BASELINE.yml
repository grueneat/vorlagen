_doc: 'Accepted unconsumed-attribute baseline for the IDML->SLA converter. `accepted`
  lists every significant (render-affecting) (element-tag/attribute) pair the converter
  does NOT consume but that has been triaged as fixed / not-impactful / unsupported
  in ATTRIBUTE_FIX_LOG.md. `batch_consumed` lists every attribute the converter DOES
  consume on at least one batch IDML -- a single-IDML gate run exercises fewer code
  paths than the batch, so this set absorbs that coverage gap. The scaffold/import
  gate (idml_attribute_coverage_audit.run_attribute_coverage_gate) fails when a converted
  IDML surfaces a significant unconsumed attribute in NEITHER list. Regenerate with:
  python3 tools/idml_attribute_coverage_audit.py --write-baseline.'
_schema_version: 2
count: 920
batch_consumed_count: 108
