# Experiment results schema — JSON Schema (draft-2020-12) expressed in YAML.
# Validates the JSON the voting page exports and the results aggregator
# consumes. Two shapes coexist via a top-level oneOf discriminating on
# `mode.const`: "rank" (ordered list of slugs) and "direct-pick" (an
# unordered set of selected slugs). Pairwise / versus mode is deleted
# entirely; v1 result files are no longer processable (issue #31).

$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://gruene-noe.at/experiments/results.schema.yaml"
title: "Experiment results"
description: >
  Voting-session results for one rater. Captures either an ordered ranking
  of variant slugs (rank mode) or a flat set of selections (direct-pick
  fallback). Per CONTEXT.md decision #9 (issue #31) the pairwise shape is
  removed; the schema bump is intentional and no migration tool ships.
type: object

required:
  - experiment_id
  - rater
  - started_at
  - exported_at
  - mode

properties:

  experiment_id:
    type: string
    pattern: "^[a-z0-9][a-z0-9-]*$"

  rater:
    type: string
    description: "Free-text rater identity. May be 'anonymous'."

  started_at:
    type: string
    description: "ISO 8601 timestamp marking session start."

  exported_at:
    type: string
    description: "ISO 8601 timestamp at export click."

  mode:
    type: string
    enum: [rank, direct-pick]

  ranking:
    type: array
    description: >
      Ordered list of variant slugs, best first. Present in rank mode
      only.
    items:
      type: string
    uniqueItems: true

  selections:
    type: array
    description: >
      Unordered set of selected variant slugs. Present in direct-pick
      mode only.
    items:
      type: string
    uniqueItems: true

oneOf:
  - title: "rank"
    properties:
      mode:
        const: "rank"
    required: [experiment_id, rater, started_at, exported_at, mode, ranking]
    not:
      required: [selections]
  - title: "direct-pick"
    properties:
      mode:
        const: "direct-pick"
    required: [experiment_id, rater, started_at, exported_at, mode, selections]
    not:
      required: [ranking]
