# Brand-level Scribus document defaults — single source of truth for the
# 113 identical extra_doc_attrs keys and 34 identical extra_pdf_attrs keys
# that are shared verbatim across all three existing templates (Plakat A1,
# Postkarte A6, Zeitung A4).
#
# These values are injected by Brand.gruene_noe() into Document(brand=...)
# so every build.py no longer needs to carry a 7KB one-line dict literal.
# Templates may still override individual keys via extra_doc_attrs= /
# extra_pdf_attrs= on the Document constructor — the per-template value wins.
#
# Keys that differ between templates (23 doc-attrs, 11 pdf-attrs) are NOT
# listed here; they remain as per-template extra_*_attrs overrides.
# Differing doc-attrs: AUTOCHECK, DPIn3, DPInCMYK, DPPr, GROUPC, GapVertical,
#   GuideRad, MAJGRID, MINGRID, PAGESIZE, POLYF, SHOWBASE, SHOWGRID,
#   SHOWGUIDES, SHOWMARGIN, ScratchBottom, ScratchLeft, ScratchRight,
#   ScratchTop, calligraphicPenAngle, dispX, dispY, renderStack.
# Differing pdf-attrs: ImageP, InfoString, PicRes, PrintP, RGBMode, RecalcPic,
#   SolidP, UseProfiles2, Version, bleedMarks, useDocBleeds.

