# Schriften-Vergleich: Tracking-Varianten von Montserrat und Raleway.
# Quelle/Begründung: .issues/42-freie-gotham-ersatzschriften-recherche-und-schriften-vergleichsseite/RESEARCH.md
#
# Verglichen werden Gotham Narrow (Original, proprietär — über das Build-Tool als
# Spalte ergänzt) gegen eng gesetzte Varianten von Montserrat und Raleway. Beide
# Schriften laufen von Haus aus zu locker/breit; einen offiziellen condensed
# Schnitt gibt es bei keiner. Daher werden sie über negatives Tracking
# (Scribus KERN, in %) enger gesetzt — das verdichtet Buchstaben- UND
# Wortabstände. Felder:
#   slug       — Kurzname (Verzeichnis-/URL-Slug)
#   name       — Anzeigename
#   family     — Family-Name (Scribus referenziert "<family> <Schnitt>")
#   files_from — Verzeichnis unter shared/fonts/alternatives/, aus dem die
#                Schriftdateien geliehen werden (die Tracking-Varianten haben
#                keine eigenen Binärdateien — nur das Tracking unterscheidet sie)
#   files      — die geliehenen Datei-Namen (in files_from-Verzeichnis)
#   track      — manuelles Tracking (Scribus KERN, %, negativ = enger)
#   weights    — Gotham-Narrow-Schnitt -> Ersatz-Schnitt
#   summary    — deutsche Kurz-Zusammenfassung
target: "Gotham Narrow"
flyer: flyer-a6-hochformat-gruenes-cover
base: templates/flyer-a6-hochformat-gruenes-cover/fonts/_base-gotham.sla
original_pdf: site/public/schriften/original/original.pdf
fonts:
  - slug: montserrat-eng4
    name: "Montserrat eng (−4)"
    license: SIL OFL 1.1
    source: "https://github.com/google/fonts/tree/main/ofl/montserrat"
    family: "Montserrat"
    files_from: montserrat
    files:
      - Montserrat-Regular.ttf
      - Montserrat-Bold.ttf
      - Montserrat-ExtraBold.ttf
      - Montserrat-Black.ttf
      - OFL.txt
    track: -4
    weights:
      Book: Regular
      Bold: Bold
      Black: ExtraBold
      Ultra: Black
    summary: >-
      Montserrat mit ausgewogen verengtem Tracking (−4 %): die als beste empfundene Buchstabenform, aber spürbar kompaktere Buchstaben- und Wortabstände. Montserrat läuft von Haus aus breit und hat keinen condensed Schnitt; das Tracking schließt die Abstands-Lücke, ohne zu drängen. Ausgangswahl für den Montserrat-Look.

  - slug: montserrat-eng5
    name: "Montserrat eng (−5)"
    license: SIL OFL 1.1
    source: "https://github.com/google/fonts/tree/main/ofl/montserrat"
    family: "Montserrat"
    files_from: montserrat
    files:
      - Montserrat-Regular.ttf
      - Montserrat-Bold.ttf
      - Montserrat-ExtraBold.ttf
      - Montserrat-Black.ttf
      - OFL.txt
    track: -5
    weights:
      Book: Regular
      Bold: Bold
      Black: ExtraBold
      Ultra: Black
    summary: >-
      Montserrat mit stärker verengtem Tracking (−5 %): noch etwas dichter als −4, näher an einer condensed-Anmutung, aber im Fließtext noch ruhig lesbar. Für einen kompakteren Montserrat-Satz, der dem schmalen Gotham-Original näher kommt.

  - slug: raleway-eng3
    name: "Raleway eng (−3)"
    license: SIL OFL 1.1
    source: "https://github.com/google/fonts/tree/main/ofl/raleway"
    family: "Raleway"
    files_from: raleway
    files:
      - Raleway-Regular.ttf
      - Raleway-Bold.ttf
      - Raleway-ExtraBold.ttf
      - Raleway-Black.ttf
      - OFL.txt
    track: -3
    weights:
      Book: Regular
      Bold: Bold
      Black: ExtraBold
      Ultra: Black
    summary: >-
      Raleway mit leichtem Tracking (−3 %): elegante geometrische Grotesk, gilt als eine der ähnlichsten Gotham-Alternativen. Behutsam verengt, damit der elegante Charakter und die feinen Formen erhalten bleiben — die luftigste der drei Raleway-Stufen.

  - slug: raleway-eng4
    name: "Raleway eng (−4)"
    license: SIL OFL 1.1
    source: "https://github.com/google/fonts/tree/main/ofl/raleway"
    family: "Raleway"
    files_from: raleway
    files:
      - Raleway-Regular.ttf
      - Raleway-Bold.ttf
      - Raleway-ExtraBold.ttf
      - Raleway-Black.ttf
      - OFL.txt
    track: -4
    weights:
      Book: Regular
      Bold: Bold
      Black: ExtraBold
      Ultra: Black
    summary: >-
      Raleway mit mittlerem Tracking (−4 %): ausgewogen verdichtet — elegante Anmutung bei deutlich kompakteren Abständen. Die mittlere Raleway-Stufe im direkten Vergleich.

  - slug: raleway-eng5
    name: "Raleway eng (−5)"
    license: SIL OFL 1.1
    source: "https://github.com/google/fonts/tree/main/ofl/raleway"
    family: "Raleway"
    files_from: raleway
    files:
      - Raleway-Regular.ttf
      - Raleway-Bold.ttf
      - Raleway-ExtraBold.ttf
      - Raleway-Black.ttf
      - OFL.txt
    track: -5
    weights:
      Book: Regular
      Bold: Bold
      Black: ExtraBold
      Ultra: Black
    summary: >-
      Raleway mit starkem Tracking (−5 %): am dichtesten gesetzt, nahe einer condensed-Anmutung. Raleways markante Formen (z. B. „w") rücken eng zusammen; im Kleinsttext die straffste, aber auch anspruchsvollste Variante.
