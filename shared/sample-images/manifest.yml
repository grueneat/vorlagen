# Master library manifest — shared/sample-images/manifest.yml
#
# Issue #13: zentralisierte Demo-Bild-Bibliothek + alle Templates auffüllen.
# Each entry documents:
#   - path: relative to shared/sample-images/
#   - prompt: verbatim Codex prompt (regenerable via tools/codex_image_gen.py --library)
#   - tags: discovery hints (D4 — permissive)
#   - synthetic: true for AI-generated content (D5 — license + EU AI Act Art 50)
#   - license_note: human-readable disclaimer
#   - size: "WxH" (Codex generation size)
#   - watermark: caption text overlaid on bottom 4% band ("Symbolfoto — KI-generiert")
#   - model / quality (optional): Codex generation parameters
#
# All bytes carry the Symbolfoto bottom-band watermark; library.crop_for_frame()
# re-applies the band on cropped variants (R-WATERMARK-CROP).
#
# Library layout: portraits/, themen/, kontext/, qr/. QR codes stay
# template-specific (D9) — qr/ is intentionally empty in the library manifest.
#
# Manifest schema enforced by tools/sla_lib/builder/library.py::validate_manifest()
# (Draft 2020-12 JSON Schema).

images:
  # ── Portraits ──────────────────────────────────────────────────────────────
  portrait_maria:
    path: portraits/maria-beispiel.jpg
    prompt: |
      Documentary photograph of a Central European woman in her mid-40s,
      head-and-shoulders portrait, soft afternoon window light from camera left,
      neutral grey-green out-of-focus background, 50mm lens, shallow depth of field,
      visible pores and natural skin texture, warm color balance, slightly desaturated greens.
      Documentary, unposed, gaze slightly past camera, half-smile.
      No watermark. No text overlays. No logos or trademarks. No glamorization. No heavy retouching.
    tags: [portrait, gender:female, age:40s, kandidatin, austrian, setting:office, composition:portrait]
    synthetic: true
    license_note: "AI-generated demo image; not a real person. Replace with real candidate photo for production use."
    size: "1024x1536"
    watermark: "Symbolfoto — KI-generiert"
    model: gpt-image-2
    quality: high

  portrait_stefan:
    path: portraits/stefan-beispiel.jpg
